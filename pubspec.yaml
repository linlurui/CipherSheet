name: ciphersheet
description: "CipherSheet - encrypted ledger backed by DecentriLicense state chain."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  cryptography: ^2.7.0
  uuid: ^4.4.0
  intl: ^0.19.0
  path_provider: ^2.1.3
  path: ^1.9.0
  fl_chart: ^0.68.0
  ffi: ^2.1.2
  crypto: ^3.0.3
  file_picker: ^8.1.2
  local_auth: ^2.3.0
  # Local path dependency to dl-core Flutter SDK bindings
  decentrilicense:
    path: ../ccait/dl-issuer/sdks/flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/keys/
